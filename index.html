```html
<script>

let currentFacingMode = "environment";
let mediaStream = null;
let currentMode = "photo";
let mediaRecorder = null;
let recordedChunks = [];

const video = document.getElementById("camera");
const captureButton = document.getElementById("capture");

const controls = document.createElement("div");

controls.className =
"fixed bottom-5 left-1/2 -translate-x-1/2 flex gap-3 z-50";

controls.innerHTML = `
<button id="switchCamera"
class="bg-black/70 text-white px-4 py-2 rounded-xl border border-white/20">
🔄
</button>

<button id="photoMode"
class="bg-red-600 text-white px-4 py-2 rounded-xl">
📸
</button>

<button id="videoMode"
class="bg-zinc-800 text-white px-4 py-2 rounded-xl">
🎥
</button>
`;

document.body.appendChild(controls);

async function startCamera() {

  try {

    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
    }

    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: currentFacingMode
      },
      audio: true
    });

    video.srcObject = mediaStream;

  } catch (error) {

    alert("Erro ao acessar câmera: " + error.message);

  }
}

startCamera();

document.getElementById("switchCamera")
.addEventListener("click", async () => {

  currentFacingMode =
  currentFacingMode === "environment"
  ? "user"
  : "environment";

  await startCamera();

});

document.getElementById("photoMode")
.addEventListener("click", () => {

  currentMode = "photo";

  document.getElementById("photoMode")
  .classList.add("bg-red-600");

  document.getElementById("videoMode")
  .classList.remove("bg-red-600");

  showSuggestion("📸 Modo foto ativado");

});

document.getElementById("videoMode")
.addEventListener("click", () => {

  currentMode = "video";

  document.getElementById("videoMode")
  .classList.add("bg-red-600");

  document.getElementById("photoMode")
  .classList.remove("bg-red-600");

  showSuggestion("🎥 Modo vídeo ativado");

});

function showSuggestion(text) {

  let suggestion =
  document.getElementById("aiSuggestion");

  if (!suggestion) {

    suggestion = document.createElement("div");

    suggestion.id = "aiSuggestion";

    suggestion.className =
    "fixed top-5 left-1/2 -translate-x-1/2 bg-black/70 text-white px-5 py-3 rounded-2xl z-50 border border-cyan-400";

    document.body.appendChild(suggestion);
  }

  suggestion.innerText = text;

  setTimeout(() => {

    suggestion.innerText =
    "💡 IA: ajuste o enquadramento para efeito cinematográfico";

  }, 2500);
}

showSuggestion("🎬 Cinematic AI iniciado");

captureButton.addEventListener("click", () => {

  if (currentMode === "photo") {

    const canvas =
    document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0);

    const image =
    canvas.toDataURL("image/png");

    const link =
    document.createElement("a");

    link.href = image;

    link.download =
    "cinematic-photo.png";

    link.click();

    showSuggestion("📸 Foto salva");

  } else {

    if (!mediaRecorder ||
    mediaRecorder.state === "inactive") {

      recordedChunks = [];

      mediaRecorder =
      new MediaRecorder(mediaStream);

      mediaRecorder.ondataavailable =
      event => {

        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = () => {

        const blob =
        new Blob(recordedChunks, {
          type: "video/webm"
        });

        const url =
        URL.createObjectURL(blob);

        const link =
        document.createElement("a");

        link.href = url;

        link.download =
        "cinematic-video.webm";

        link.click();

        showSuggestion("🎥 Vídeo salvo");
      };

      mediaRecorder.start();

      showSuggestion("🔴 Gravando vídeo");

    } else {

      mediaRecorder.stop();

    }
  }
});

if ("serviceWorker" in navigator) {

  window.addEventListener("load", () => {

    navigator.serviceWorker
    .register("./sw.js");

  });
}

</script>
```
