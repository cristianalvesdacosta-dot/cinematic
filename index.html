<script>

let currentFacingMode = "environment";

const video =
document.getElementById("camera");

const canvas =
document.getElementById("overlay");

const ctx =
canvas.getContext("2d");

let net;

async function startCamera(){

const stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:currentFacingMode
},

audio:false

});

video.srcObject = stream;

}

async function loadAI(){

await tf.setBackend("webgl");

net =
await bodyPix.load({

architecture:"MobileNetV1",
outputStride:16,
multiplier:0.75,
quantBytes:2

});

detect();

}

async function detect(){

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const segmentation =
await net.segmentPerson(video);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

const coloredPartImage =
bodyPix.toMask(
segmentation
);

bodyPix.drawMask(

canvas,
video,
coloredPartImage,

0.7,
0,
true

);

const data = segmentation.data;

let minX = Infinity;
let minY = Infinity;
let maxX = 0;
let maxY = 0;

for(let y=0;y<segmentation.height;y++){

for(let x=0;x<segmentation.width;x++){

const n =
y * segmentation.width + x;

if(data[n] === 1){

minX = Math.min(minX,x);
minY = Math.min(minY,y);

maxX = Math.max(maxX,x);
maxY = Math.max(maxY,y);

}

}

}

if(minX !== Infinity){

const scaleX =
canvas.width /
segmentation.width;

const scaleY =
canvas.height /
segmentation.height;

ctx.strokeStyle = "cyan";

ctx.lineWidth = 5;

ctx.shadowColor = "cyan";

ctx.shadowBlur = 20;

ctx.strokeRect(

minX * scaleX,
minY * scaleY,

(maxX - minX) * scaleX,
(maxY - minY) * scaleY

);

document.getElementById(
"suggestion"
).innerText =
"🎯 Alinhe a pessoa ao contorno";

}else{

document.getElementById(
"suggestion"
).innerText =
"🔍 Procurando pessoa...";

}

requestAnimationFrame(detect);

}

startCamera().then(loadAI);

document.getElementById(
"switchCamera"
).onclick = async ()=>{

currentFacingMode =
currentFacingMode === "environment"
? "user"
: "environment";

await startCamera();

};

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./sw.js"
);

}

</script>
