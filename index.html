<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShadowShot AI</title>

<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial, sans-serif;
}

video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:fixed;
inset:0;
border:8px solid rgba(255,0,0,0.15);
pointer-events:none;
}

.topbar{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:12px 18px;
border-radius:20px;
color:white;
border:1px solid cyan;
z-index:999;
font-size:14px;
}

.controls{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:12px;
z-index:999;
}

.btn{
background:rgba(0,0,0,0.7);
color:white;
border:none;
padding:14px;
border-radius:50%;
font-size:20px;
}

.capture{
width:85px;
height:85px;
border-radius:50%;
background:white;
border:8px solid #ccc;
}

.mode{
position:fixed;
bottom:140px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:999;
}

.mode button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#222;
color:white;
font-size:14px;
}

.active{
background:red !important;
}
</style>

</head>

<body>

<video
id="camera"
autoplay
playsinline
muted
></video>

<div class="overlay"></div>

<div id="suggestion" class="topbar">
🎬 Cinematic AI iniciado
</div>

<div class="mode">

<button
id="photoMode"
class="active"
>
📸 Foto
</button>

<button
id="videoMode"
>
🎥 Vídeo
</button>

</div>

<div class="controls">

<button
id="switchCamera"
class="btn"
>
🔄
</button>

<button
id="capture"
class="capture"
>
</button>

</div>

<script>

let currentFacingMode = "environment";
let currentMode = "photo";

let mediaStream = null;
let mediaRecorder = null;

let recordedChunks = [];

const video =
document.getElementById("camera");

async function startCamera(){

try{

if(mediaStream){
mediaStream.getTracks().forEach(
track => track.stop()
);
}

mediaStream =
await navigator.mediaDevices.getUserMedia({
video:{
facingMode:currentFacingMode
},
audio:true
});

video.srcObject = mediaStream;

}catch(error){

alert(
"Erro câmera: " + error.message
);

}

}

startCamera();

function suggestion(text){

document.getElementById(
"suggestion"
).innerText = text;

}

document.getElementById(
"switchCamera"
).onclick = async ()=>{

currentFacingMode =
currentFacingMode === "environment"
? "user"
: "environment";

await startCamera();

suggestion("🔄 Câmera alterada");

};

document.getElementById(
"photoMode"
).onclick = ()=>{

currentMode = "photo";

document.getElementById(
"photoMode"
).classList.add("active");

document.getElementById(
"videoMode"
).classList.remove("active");

suggestion("📸 Modo foto");

};

document.getElementById(
"videoMode"
).onclick = ()=>{

currentMode = "video";

document.getElementById(
"videoMode"
).classList.add("active");

document.getElementById(
"photoMode"
).classList.remove("active");

suggestion("🎥 Modo vídeo");

};

document.getElementById(
"capture"
).onclick = ()=>{

if(currentMode === "photo"){

const canvas =
document.createElement("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(video,0,0);

const link =
document.createElement("a");

link.download =
"shadowshot-photo.png";

link.href =
canvas.toDataURL();

link.click();

suggestion("📸 Foto salva");

}else{

if(
!mediaRecorder ||
mediaRecorder.state === "inactive"
){

recordedChunks = [];

mediaRecorder =
new MediaRecorder(mediaStream);

mediaRecorder.ondataavailable =
event =>{

if(event.data.size > 0){
recordedChunks.push(event.data);
}

};

mediaRecorder.onstop = ()=>{

const blob =
new Blob(recordedChunks,{
type:"video/webm"
});

const url =
URL.createObjectURL(blob);

const link =
document.createElement("a");

link.href = url;

link.download =
"shadowshot-video.webm";

link.click();

suggestion("🎥 Vídeo salvo");

};

mediaRecorder.start();

suggestion("🔴 Gravando");

}else{

mediaRecorder.stop();

}

}

};

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./sw.js"
);

}

setInterval(()=>{

const ideas = [

"💡 IA: incline levemente a câmera",

"💡 IA: aproxime o objeto principal",

"💡 IA: use ângulo baixo para efeito cinematic",

"💡 IA: centralize a silhueta",

"💡 IA: use movimento suave"

];

const random =
ideas[
Math.floor(
Math.random()*ideas.length
)
];

suggestion(random);

},7000);

</script>

</body>
</html>
