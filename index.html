<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Camera Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h2>AI Camera Pro</h2>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="status">Carregando IA...</div>

  <div class="buttons">
    <button onclick="setFilter('none')">Normal</button>
    <button onclick="setFilter('brightness(1.2)')">Brilho</button>
    <button onclick="setFilter('contrast(1.3)')">Contraste</button>
    <button onclick="setFilter('sepia(1)')">Vintage</button>
  </div>

  <button onclick="takePhoto()">📸 Foto</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="script.js"></script>

</body>
</html>
