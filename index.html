```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShadowShot AI</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black overflow-hidden">

<video
id="camera"
autoplay
playsinline
muted
class="fixed inset-0 w-full h-full object-cover"
></video>

<div class="fixed inset-0 border-[8px] border-red-500/20 pointer-events-none"></div>

<div
id="suggestion"
class="fixed top-5 left-1/2 -translate-x-1/2 bg-black/70 text-white px-5 py-3 rounded-2xl border border-cyan-400 z-50"
>
🎬 Cinematic AI iniciado
</div>

<div
class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 z-50"
>

<button
id="switchCamera"
class="bg-black/70 text-white px-4 py-3 rounded-full border border-white/20"
>
🔄
</button>

<button
id="photoMode"
class="bg-red-600 text-white px-4 py-3 rounded-full"
>
📸
</button>

<button
id="videoMode"
class="bg-zinc-800 text-white px-4 py-3 rounded-full"
>
🎥
</button>

<button
id="capture"
class="w-20 h-20 rounded-full bg-white border-8 border-zinc-300"
>
</button>

</div>

<script>

let currentFacingMode = "environment";
let currentMode = "photo";

let mediaStream = null;
let mediaRecorder = null;

let recordedChunks = [];

const video = document.getElementById("camera");

async function startCamera() {

  try {

    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
    }

    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: currentFacingMode
      },
      audio: true
    });

    video.srcObject = mediaStream;

  } catch (error) {

    alert("Erro câmera: " + error.message);

  }
}

startCamera();

function showSuggestion(text) {

  document.getElementById("suggestion")
  .innerText = text;
}

document
.getElementById("switchCamera")
.onclick = async () => {

  currentFacingMode =
  currentFacingMode === "environment"
  ? "user"
  : "environment";

  await startCamera();

  showSuggestion("🔄 Câmera alterada");
};

document
.getElementById("photoMode")
.onclick = () => {

  currentMode = "photo";

  showSuggestion("📸 Modo foto");
};

document
.getElementById("videoMode")
.onclick = () => {

  currentMode = "video";

  showSuggestion("🎥 Modo vídeo");
};

document
.getElementById("capture")
.onclick = () => {

  if (currentMode === "photo") {

    const canvas =
    document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0);

    const link =
    document.createElement("a");

    link.download =
    "cinematic-photo.png";

    link.href =
    canvas.toDataURL();

    link.click();

    showSuggestion("📸 Foto salva");

  } else {

    if (
      !mediaRecorder ||
      mediaRecorder.state === "inactive"
    ) {

      recordedChunks = [];

      mediaRecorder =
      new MediaRecorder(mediaStream);

      mediaRecorder.ondataavailable =
      event => {

        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = () => {

        const blob =
        new Blob(recordedChunks, {
          type: "video/webm"
        });

        const url =
        URL.createObjectURL(blob);

        const link =
        document.createElement("a");

        link.href = url;

        link.download =
        "cinematic-video.webm";

        link.click();

        showSuggestion("🎥 Vídeo salvo");
      };

      mediaRecorder.start();

      showSuggestion("🔴 Gravando");

    } else {

      mediaRecorder.stop();
    }
  }
};

if ("serviceWorker" in navigator) {

  navigator.serviceWorker
  .register("./sw.js");
}

</script>

</body>
</html>
```
