```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ShadowShot AI</title>

<meta name="theme-color"
content="#000000">

<link rel="manifest"
href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
pointer-events:none;
}

.topbar{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:12px 18px;
border-radius:20px;
color:white;
border:1px solid cyan;
z-index:999;
font-size:14px;
}

.controls{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:12px;
z-index:999;
}

.btn{
background:rgba(0,0,0,0.7);
color:white;
border:none;
padding:14px;
border-radius:50%;
font-size:20px;
}

.capture{
width:85px;
height:85px;
border-radius:50%;
background:white;
border:8px solid #ccc;
}

.mode{
position:fixed;
bottom:140px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:999;
}

.mode button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#222;
color:white;
font-size:14px;
}

.active{
background:red !important;
}

</style>

</head>

<body>

<video
id="camera"
autoplay
playsinline
muted
></video>

<canvas id="overlay"></canvas>

<div id="suggestion"
class="topbar">

🎬 IA analisando ambiente...

</div>

<div class="mode">

<button
id="photoMode"
class="active">

📸 Foto

</button>

<button
id="videoMode">

🎥 Vídeo

</button>

</div>

<div class="controls">

<button
id="switchCamera"
class="btn">

🔄

</button>

<button
id="capture"
class="capture">

</button>

</div>

<script>

let currentFacingMode =
"environment";

let currentMode =
"photo";

let mediaStream = null;

let mediaRecorder = null;

let recordedChunks = [];

let net;

const video =
document.getElementById(
"camera"
);

const canvas =
document.getElementById(
"overlay"
);

const ctx =
canvas.getContext("2d");

async function startCamera(){

try{

if(mediaStream){

mediaStream
.getTracks()
.forEach(
track => track.stop()
);

}

mediaStream =
await navigator
.mediaDevices
.getUserMedia({

video:{
facingMode:
currentFacingMode
},

audio:true

});

video.srcObject =
mediaStream;

}catch(error){

alert(
"Erro câmera: "
+ error.message
);

}

}

async function loadAI(){

await tf.setBackend(
"webgl"
);

net =
await bodyPix.load({

architecture:
"MobileNetV1",

outputStride:16,

multiplier:0.75,

quantBytes:2

});

detect();

}

async function detect(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const segmentation =
await net.segmentPerson(
video
);

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

const mask =
bodyPix.toMask(
segmentation
);

bodyPix.drawMask(

canvas,
video,
mask,

0.7,
0,
true

);

const data =
segmentation.data;

let minX = Infinity;
let minY = Infinity;

let maxX = 0;
let maxY = 0;

for(
let y = 0;
y < segmentation.height;
y++
){

for(
let x = 0;
x < segmentation.width;
x++
){

const n =
y *
segmentation.width
+ x;

if(data[n] === 1){

minX =
Math.min(minX,x);

minY =
Math.min(minY,y);

maxX =
Math.max(maxX,x);

maxY =
Math.max(maxY,y);

}

}

}

if(minX !== Infinity){

const scaleX =
canvas.width /
segmentation.width;

const scaleY =
canvas.height /
segmentation.height;

ctx.strokeStyle =
"cyan";

ctx.lineWidth = 5;

ctx.shadowColor =
"cyan";

ctx.shadowBlur = 20;

ctx.strokeRect(

minX * scaleX,

minY * scaleY,

(maxX-minX)
* scaleX,

(maxY-minY)
* scaleY

);

document
.getElementById(
"suggestion"
)
.innerText =
"🎯 Alinhe ao contorno";

}else{

document
.getElementById(
"suggestion"
)
.innerText =
"🔍 Procurando pessoa...";

}

requestAnimationFrame(
detect
);

}

startCamera()
.then(loadAI);

document
.getElementById(
"switchCamera"
)
.onclick = async ()=>{

currentFacingMode =

currentFacingMode
=== "environment"

? "user"

: "environment";

await startCamera();

};

document
.getElementById(
"photoMode"
)
.onclick = ()=>{

currentMode =
"photo";

document
.getElementById(
"photoMode"
)
.classList
.add("active");

document
.getElementById(
"videoMode"
)
.classList
.remove("active");

};

document
.getElementById(
"videoMode"
)
.onclick = ()=>{

currentMode =
"video";

document
.getElementById(
"videoMode"
)
.classList
.add("active");

document
.getElementById(
"photoMode"
)
.classList
.remove("active");

};

document
.getElementById(
"capture"
)
.onclick = ()=>{

if(
currentMode
=== "photo"
){

const photo =
document
.createElement(
"canvas"
);

photo.width =
video.videoWidth;

photo.height =
video.videoHeight;

const photoCtx =
photo.getContext(
"2d"
);

photoCtx.drawImage(
video,
0,
0
);

const link =
document
.createElement(
"a"
);

link.download =
"shadowshot-photo.png";

link.href =
photo.toDataURL();

link.click();

document
.getElementById(
"suggestion"
)
.innerText =
"📸 Foto salva";

}else{

if(

!mediaRecorder ||

mediaRecorder.state
=== "inactive"

){

recordedChunks =
[];

mediaRecorder =
new MediaRecorder(
mediaStream
);

mediaRecorder
.ondataavailable =
event=>{

if(
event.data.size
> 0
){

recordedChunks
.push(
event.data
);

}

};

mediaRecorder
.onstop = ()=>{

const blob =
new Blob(
recordedChunks,
{
type:
"video/webm"
}
);

const url =
URL
.createObjectURL(
blob
);

const link =
document
.createElement(
"a"
);

link.href =
url;

link.download =
"shadowshot-video.webm";

link.click();

document
.getElementById(
"suggestion"
)
.innerText =
"🎥 Vídeo salvo";

};

mediaRecorder.start();

document
.getElementById(
"suggestion"
)
.innerText =
"🔴 Gravando";

}else{

mediaRecorder.stop();

}

}

};

if(
"serviceWorker"
in navigator
){

navigator
.serviceWorker
.register(
"./sw.js"
);

}

</script>

</body>
</html>
```
