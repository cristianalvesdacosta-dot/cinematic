<script>
let currentFacingMode = "environment";
let mediaStream = null;
let currentMode = "photo";

const video = document.getElementById("camera");
const captureButton = document.getElementById("capture");

const controls = document.createElement("div");
controls.className = "fixed bottom-5 left-1/2 -translate-x-1/2 flex gap-3 z-50";

controls.innerHTML = `
<button id="switchCamera" class="bg-black/70 text-white px-4 py-2 rounded-xl border border-white/20">
🔄 Câmera
</button>

<button id="photoMode" class="bg-red-600 text-white px-4 py-2 rounded-xl">
📸 Foto
</button>

<button id="videoMode" class="bg-zinc-800 text-white px-4 py-2 rounded-xl">
🎥 Vídeo
</button>
`;

document.body.appendChild(controls);

async function startCamera() {
  try {

    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
    }

    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: currentFacingMode
      },
      audio: true
    });

    video.srcObject = mediaStream;

  } catch (error) {
    alert("Erro câmera: " + error.message);
  }
}

startCamera();

document.getElementById("switchCamera").onclick = async () => {

  currentFacingMode =
    currentFacingMode === "environment"
      ? "user"
      : "environment";

  await startCamera();
};

document.getElementById("photoMode").onclick = () => {
  currentMode = "photo";

  document.getElementById("photoMode").classList.add("bg-red-600");
  document.getElementById("videoMode").classList.remove("bg-red-600");

  showSuggestion("Modo foto ativado");
};

document.getElementById("videoMode").onclick = () => {
  currentMode = "video";

  document.getElementById("videoMode").classList.add("bg-red-600");
  document.getElementById("photoMode").classList.remove("bg-red-600");

  showSuggestion("Modo vídeo ativado");
};

function showSuggestion(text) {

  let suggestion = document.getElementById("aiSuggestion");

  if (!suggestion) {
    suggestion = document.createElement("div");

    suggestion.id = "aiSuggestion";

    suggestion.className =
      "fixed top-5 left-1/2 -translate-x-1/2 bg-black/70 text-white px-5 py-3 rounded-2xl z-50 border border-cyan-400";

    document.body.appendChild(suggestion);
  }

  suggestion.innerText = text;

  setTimeout(() => {
    suggestion.innerText =
      "💡 IA: incline levemente a câmera para efeito cinematográfico";
  }, 2500);
}

showSuggestion("🎬 Cinematic AI iniciado");

captureButton.onclick = () => {

  if (currentMode === "photo") {

    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0);

    const link = document.createElement("a");

    link.download = `cinematic-${Date.now()}.png`;

    link.href = canvas.toDataURL("image/png");

    link.click();

    showSuggestion("📸 Foto salva com sucesso");

  } else {

    showSuggestion("🎥 Gravação de vídeo em desenvolvimento");
  }
};

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>
